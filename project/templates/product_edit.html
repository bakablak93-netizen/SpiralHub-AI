{% extends "base.html" %}
{% block title %}Редактировать: {{ product.title }} — AI Craft Hub{% endblock %}
{% block content %}
<h1 style="margin-top:0;">Редактировать товар</h1>

<div class="form-card" style="max-width:640px;">
  <form method="post" action="{{ url_for('product_edit', pid=product.id) }}" enctype="multipart/form-data">
    <label for="image">Новое фото (необязательно)</label>
    <input type="file" id="product_image" name="image" accept="image/png,image/jpeg,image/webp,.png,.jpg,.jpeg,.webp">
    <p class="hint" style="margin-top:-0.5rem;">Оставьте пустым, чтобы сохранить текущее изображение.</p>

    <label for="title">Название</label>
    <input type="text" id="title" name="title" required value="{{ product.title }}">

    <label for="category">Категория</label>
    <select id="category" name="category">
      {% for c in categories %}
        <option value="{{ c }}" {% if product.category == c %}selected{% endif %}>{{ c }}</option>
      {% endfor %}
    </select>

    <label for="price">Цена (₽)</label>
    <input type="number" id="price" name="price" step="0.01" min="0" required value="{{ product.price }}">

    <div class="checkbox-row">
      <input type="checkbox" id="is_eco" name="is_eco" value="1" {% if product.is_eco %}checked{% endif %}>
      <label for="is_eco" style="margin:0;font-weight:500;">Отметить как eco / ESG товар</label>
    </div>

    <label for="description">Описание</label>
    <textarea id="description" name="description" rows="6">{{ product.description or '' }}</textarea>

    <div style="display:flex;gap:0.5rem;flex-wrap:wrap;margin-bottom:1rem;">
      <button type="button" class="btn btn-ghost btn-sm" id="btn-ai-desc">Сгенерировать описание через AI</button>
      <span class="hint" id="ai-desc-status"></span>
    </div>

    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
  </form>
</div>
<p class="hint">
  <a href="{{ url_for('product_detail', pid=product.id) }}">Карточка товара</a> ·
  <a href="{{ url_for('profile') }}">Профиль</a>
</p>

<script>
(function() {
  document.getElementById('btn-ai-desc').addEventListener('click', async function() {
    const title = document.getElementById('title').value.trim();
    const category = document.getElementById('category').value;
    const status = document.getElementById('ai-desc-status');
    if (!title) { status.textContent = 'Сначала введите название'; return; }
    status.textContent = 'Генерация…';
    const r = await fetch('{{ url_for("api_describe") }}', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ title, category, hints: '' })
    });
    const j = await r.json();
    if (j.description) {
      document.getElementById('description').value = j.description;
      status.textContent = 'Готово';
    } else {
      status.textContent = j.error || 'Ошибка';
    }
  });
})();
</script>
{% endblock %}
