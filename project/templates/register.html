{% extends "base.html" %}
{% block title %}{{ _('auth.register_title') }}{% endblock %}
{% block content %}
<div class="form-card">
  <h1 style="margin-top:0;">{{ _('auth.register_heading') }}</h1>
  <form method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <label for="email">{{ _('auth.email') }}</label>
    <input type="email" id="email" name="email" required autocomplete="username">

    <label for="password">{{ _('auth.password') }}</label>
    <input type="password" id="password" name="password" required autocomplete="new-password">

    <label for="display_name">{{ _('auth.display_name') }}</label>
    <input type="text" id="display_name" name="display_name" placeholder="{{ _('auth.display_name_ph') }}">

    <label for="role">{{ _('auth.role') }}</label>
    <select id="role" name="role">
      <option value="buyer">{{ _('role.buyer') }}</option>
      <option value="seller">{{ _('role.seller') }}</option>
    </select>

    <button type="submit" class="btn btn-primary" style="width:100%;">{{ _('auth.submit_register') }}</button>
  </form>
  <p class="hint" style="margin-top:1rem;">{{ _('auth.have_account') }} <a href="{{ url_for('login') }}">{{ _('auth.login_link') }}</a></p>
</div>
{% endblock %}
